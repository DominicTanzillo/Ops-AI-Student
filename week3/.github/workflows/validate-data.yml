name: Week 3 - Data Quality Validation

# Triggers:
#  - hourly cron (silent-failures-are-the-top-fear stance: validate often)
#  - any push to main that touches week3 or this workflow
#  - manual via workflow_dispatch
#
# Data source: the course repository at AIPI-561-Operationalizing-AI/Ops-AI-Student
# is sparse-checked-out at run time, so the 75 MB parquet does not live in this
# solution repo (per TA guidance for Assignment 3).

on:
  schedule:
    - cron: '0 * * * *'  # top of every hour, UTC
  push:
    branches: [main]
    paths:
      - 'week3/validation/**'
      - 'week3/backend/**'
      - '.github/workflows/validate-data.yml'
  workflow_dispatch:

permissions:
  contents: read
  issues: write  # required so a failure can auto-open a GitHub Issue

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout solution repo
        uses: actions/checkout@v4

      - name: Sparse-checkout course repo (data only)
        uses: actions/checkout@v4
        with:
          repository: AIPI-561-Operationalizing-AI/Ops-AI-Student
          ref: main
          path: course-data
          sparse-checkout: |
            week3/data

      - name: Stage course parquet into expected path
        # The validator and the pytest fixture both look for the parquet at
        # week3/data/demand_enriched_corrupted.parquet. The sparse-checkout
        # places it under course-data/week3/data/. Move it to the expected
        # location so the existing code does not need a path override.
        run: |
          mkdir -p week3/data
          cp course-data/week3/data/demand_enriched_corrupted.parquet \
             week3/data/demand_enriched_corrupted.parquet
          ls -lh week3/data/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pandas pyarrow numpy pytest

      # ------------------------------------------------------------------
      # First gate: validator's own pytest suite must pass.
      # This is the meta-test: "does our validator behave correctly?"
      # - It covers per-check positive / negative / edge cases
      # - It includes a smoke test that runs the validator against a clean
      #   historical slice and asserts no false positives.
      # ------------------------------------------------------------------
      - name: Run validator pytest suite
        run: |
          cd week3
          python -m pytest validation/test_data_quality.py -v --tb=short

      # ------------------------------------------------------------------
      # Second gate: run the validator against the current course parquet.
      # This is the "is today's batch good?" check.
      # - exit 0 (passed=True) means no critical issues found.
      # - exit 1 means critical issues found - block deployment.
      # continue-on-error lets us inspect the result below and decide
      # whether to open a GitHub Issue.
      # ------------------------------------------------------------------
      - name: Validate course parquet (current batch)
        id: validate-batch
        continue-on-error: true
        run: |
          cd week3
          python -m validation.check_data_quality \
            data/demand_enriched_corrupted.parquet \
            --fail-on-critical \
            > validation-report.json
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: Upload validation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-report-${{ github.run_id }}
          path: week3/validation-report.json
          retention-days: 30

      # ------------------------------------------------------------------
      # If validator detected issues, open / update a GitHub Issue.
      # The detection itself is the success-of-the-pipeline (we wanted to
      # know the batch is bad). We file the issue so a human can act.
      # ------------------------------------------------------------------
      - name: Open issue on critical issues found
        if: steps.validate-batch.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('week3/validation-report.json', 'utf8');
            const parsed = JSON.parse(report);

            const summaryRows = Object.entries(parsed.summary || {})
              .map(([k, v]) => `| \`${k}\` | ${v} |`)
              .join('\n') || '| (none) | - |';

            const issueRows = (parsed.issues || []).map(i =>
              `- **${i.severity.toUpperCase()}** / \`${i.check}\` / ${i.affected_rows} rows / ${i.description}`
            ).join('\n') || '_(no detailed issues; see report artifact)_';

            const title = `[data-quality] critical issues detected in batch (run ${context.runId})`;
            const body = [
              '## Data quality validation: critical issues detected',
              '',
              `Workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              `Commit: \`${context.sha}\``,
              `Triggered by: \`${context.eventName}\``,
              '',
              '### Summary',
              '| metric | value |',
              '|---|---|',
              summaryRows,
              '',
              '### Issues',
              issueRows,
              '',
              '### Recommended action',
              'Investigate the upstream data pipeline. Until the source is fixed, the runtime',
              'graceful-degradation layer in `week3/backend/data.py` will auto-fix the same',
              'issues at startup (dropping invalid trip_count rows, deduplicating, correcting',
              'mislabeled is_holiday flags) up to a 5% drop-rate ceiling.',
              '',
              '_Auto-filed by `.github/workflows/validate-data.yml`._',
            ].join('\n');

            // Avoid filing many duplicate issues for the same recurring problem.
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'data-quality',
              per_page: 50,
            });
            const dup = existing.data.find(i => i.title.startsWith('[data-quality] critical issues detected'));
            if (dup) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: dup.number,
                body: `New occurrence: run ${context.runId} (\`${context.sha}\`). Report attached as workflow artifact.`,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title, body,
                labels: ['data-quality', 'auto-generated'],
              });
            }

      # ------------------------------------------------------------------
      # Final exit code: workflow exits 0 when the validator behaved correctly,
      # regardless of whether the batch passed or failed validation.
      # The "block deployment" decision when bad data is detected is recorded
      # via the opened GitHub Issue, not via the workflow exit code, so the
      # Actions tab stays green as long as the gate is functioning.
      # The workflow only goes red if an earlier step (pytest, validator
      # crash, checkout failure) actually broke.
      # ------------------------------------------------------------------
      - name: Final result
        run: |
          EXIT="${{ steps.validate-batch.outputs.exit_code }}"
          if [ "$EXIT" = "0" ]; then
            echo "Batch passed validation: no critical issues detected."
          else
            echo "Batch validation found critical issues (validator exit code $EXIT)."
            echo "Decision recorded: BLOCK deployment. GitHub Issue filed with structured details."
            echo "This step exits 0 because the validator behaved correctly; the gate"
            echo "decision is captured in the Issue, not the workflow exit code."
          fi
          exit 0
