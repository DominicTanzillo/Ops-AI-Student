name: Week 4 - Drift Monitoring

# Two-tier monitoring cadence (per locked design):
#   - hourly (`0 * * * *`) is the active CI cadence. The hourly run executes
#     all 8 metrics; the design separation between Tier A (drift + data
#     quality) and Tier B (accuracy / concept drift) is documented in the
#     Week 4 writeup. In production we would skip the accuracy metrics in
#     hours when 24-48h ground-truth lag has not yet elapsed; for this
#     assignment the parquet always contains actuals so we report both.
#
# Data source: the course repository at AIPI-561-Operationalizing-AI/Ops-AI-Student
# is sparse-checked-out at run time, so the 79 MB parquet does not live in
# this solution repo (per TA guidance: do not upload large datasets).

on:
  schedule:
    - cron: '0 * * * *'  # top of every hour, UTC
  push:
    branches: [main]
    paths:
      - 'week4/scripts/**'
      - 'week4/.github/workflows/monitor-drift.yml'
      - '.github/workflows/monitor-drift.yml'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout solution repo
        uses: actions/checkout@v4

      - name: Sparse-checkout course repo (data + model)
        uses: actions/checkout@v4
        with:
          repository: AIPI-561-Operationalizing-AI/Ops-AI-Student
          ref: main
          path: course-data
          sparse-checkout: |
            week4/data
            week2/model

      - name: Stage course parquet + model into expected paths
        run: |
          mkdir -p week4/data week2/model
          cp course-data/week4/data/demand_enriched_week4.parquet \
             week4/data/demand_enriched_week4.parquet
          cp course-data/week2/model/lgbm_demand_model.txt \
             week2/model/lgbm_demand_model.txt
          ls -lh week4/data/ week2/model/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pandas pyarrow numpy scipy scikit-learn lightgbm pytest

      # ------------------------------------------------------------------
      # First gate: the monitoring tests must pass.
      # 23 tests (5 stat helpers + 17 metric unit tests + 1 integration).
      # If this fails, the monitor itself is broken.
      # ------------------------------------------------------------------
      - name: Run monitoring pytest suite
        run: |
          cd week4
          python -m pytest scripts/test_monitoring.py -v --tb=short

      # ------------------------------------------------------------------
      # Second gate: run compute_metrics.py against the upstream parquet.
      # continue-on-error lets us inspect the result and decide whether
      # to open a GitHub Issue, without failing the workflow itself.
      # ------------------------------------------------------------------
      - name: Compute monitoring metrics
        id: metrics
        continue-on-error: true
        run: |
          cd week4
          python scripts/compute_metrics.py \
            --parquet data/demand_enriched_week4.parquet \
            --model ../week2/model/lgbm_demand_model.txt \
            --out data/metrics_report.json
          # Surface the decision so the next step can branch on it.
          python -c "import json; print('decision='+json.load(open('data/metrics_report.json'))['decision'])" \
            >> "$GITHUB_OUTPUT"

      - name: Detect drift patterns
        id: drift
        continue-on-error: true
        run: |
          cd week4
          python scripts/detect_drift.py \
            --parquet data/demand_enriched_week4.parquet \
            --model ../week2/model/lgbm_demand_model.txt \
            --out data/drift_patterns.json

      - name: Upload monitoring report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: monitoring-report-${{ github.run_id }}
          path: |
            week4/data/metrics_report.json
            week4/data/drift_patterns.json
          retention-days: 30

      # ------------------------------------------------------------------
      # On critical alerts, open / update a GitHub Issue with a structured
      # summary. Same pattern as Week 3's validate-data workflow.
      # ------------------------------------------------------------------
      - name: Open issue on critical drift alerts
        if: steps.metrics.outputs.decision == 'BLOCK_DEPLOY_AND_PAGE'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('week4/data/metrics_report.json', 'utf8'));

            const alerts = report.alerts || {};
            const criticals = alerts.critical || [];
            // Group by metric name so the issue body is readable
            const byMetric = {};
            for (const a of criticals) {
              (byMetric[a.metric] = byMetric[a.metric] || []).push(a);
            }
            const metricRows = Object.entries(byMetric)
              .map(([m, arr]) => `- **${m}**: ${arr.length} critical alert(s)`)
              .join('\n') || '_(none)_';

            const m1 = (report.metrics || {}).metric_1_accuracy || {};
            const summaryRows = [
              `| metric | value |`,
              `|---|---|`,
              `| run | ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId} |`,
              `| baseline window end | \`${report.baseline_window?.end}\` |`,
              `| new window | \`${report.new_window?.start}\` -> \`${report.new_window?.end}\` |`,
              `| critical alerts | ${alerts.critical_count || 0} |`,
              `| warning alerts | ${alerts.warning_count || 0} |`,
              `| Poisson deviance rel-delta | ${m1.deviance_rel_delta?.toFixed?.(4) ?? '-'} |`,
              `| RMSE rel-delta | ${m1.rmse_rel_delta?.toFixed?.(4) ?? '-'} |`,
              `| MAPE abs-delta | ${m1.mape_abs_delta?.toFixed?.(4) ?? '-'} |`,
            ].join('\n');

            const title = `[drift] critical alerts in monitoring run ${context.runId}`;
            const body = [
              '## Drift monitoring: critical alerts detected',
              '',
              '### Run summary',
              summaryRows,
              '',
              '### Alerts by metric',
              metricRows,
              '',
              '### Recommended action',
              'Investigate the upstream data + model pipeline. The detailed JSON',
              'reports (metrics_report.json + drift_patterns.json) are attached as',
              'workflow artifacts. Per the locked retraining design, this report',
              'recommends BLOCK_DEPLOY_AND_PAGE; retraining trigger fires when 2+',
              'consecutive monitoring runs land in BLOCK_DEPLOY_AND_PAGE.',
              '',
              '_Auto-filed by `.github/workflows/monitor-drift.yml`._',
            ].join('\n');

            // Dedupe: update an existing open drift issue rather than file a duplicate.
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'drift-alert',
              per_page: 50,
            });
            const dup = existing.data.find(i => i.title.startsWith('[drift] critical alerts'));
            if (dup) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: dup.number,
                body: `New occurrence: run ${context.runId} (\`${context.sha}\`). ${alerts.critical_count} criticals. Reports attached as artifact.`,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title, body,
                labels: ['drift-alert', 'auto-generated'],
              });
            }

      # ------------------------------------------------------------------
      # Final result: workflow exits 0 when the monitor behaved correctly,
      # regardless of whether it detected drift. The block / retrain decision
      # is recorded via the GitHub Issue + JSON artifact, not the exit code.
      # Same cosmetic-green pattern as Week 3.
      # ------------------------------------------------------------------
      - name: Final result
        run: |
          DECISION="${{ steps.metrics.outputs.decision }}"
          if [ "$DECISION" = "OK" ]; then
            echo "Monitoring run: no drift detected."
          elif [ "$DECISION" = "MONITOR" ]; then
            echo "Monitoring run: warnings present, no critical alerts."
          elif [ "$DECISION" = "BLOCK_DEPLOY_AND_PAGE" ]; then
            echo "Monitoring run: critical alerts detected; GitHub Issue filed."
            echo "Decision recorded: BLOCK_DEPLOY_AND_PAGE."
          else
            echo "Monitoring run: unknown decision='$DECISION'."
          fi
          echo "This step exits 0 because the monitor behaved correctly;"
          echo "the gate decision is captured in the Issue + artifact."
          exit 0
